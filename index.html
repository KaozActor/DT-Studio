<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Organizador Modular</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 20px;
  background: linear-gradient(135deg, #1e1e2f, #2b2b40);
  color: white;
}

h1 {
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 20px;
}

.card {
  background: #2f2f45;
  border-radius: 15px;
  padding: 15px;
  width: 260px;
}

.progress-bar {
  height: 10px;
  background: #444;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

.progress {
  height: 100%;
  background: #6ed3df;
  width: 0%;
  transition: width 0.4s ease;
}

.task {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
  background: #3a3a55;
  padding: 6px;
  border-radius: 8px;
}

.task span.done {
  text-decoration: line-through;
  opacity: 0.6;
}

.deadline {
  font-size: 0.7em;
  opacity: 0.7;
}

.overdue {
  color: #ff6b6b;
}

button {
  margin-top: 5px;
  cursor: pointer;
}

input {
  width: 100%;
  padding: 5px;
  margin-top: 5px;
}

.delete-module {
  background: red;
  color: white;
  border: none;
  border-radius: 5px;
  padding: 3px 6px;
}

</style>
</head>
<body>

<h1>Organizador Modular</h1>

<button onclick="createModule()">+ Novo Módulo</button>

<div class="container" id="modules"></div>

<script>
function calculateProgress(taskList) {
  const tasks = taskList.querySelectorAll('.task');
  if (tasks.length === 0) return 0;

  const done = [...tasks].filter(t => t.querySelector('input').checked).length;
  return (done / tasks.length) * 100;
}

function updateProgress(card, taskList) {
  const progress = calculateProgress(taskList);
  const bar = card.querySelector('.progress');
  bar.style.width = progress + '%';
}

function createModule() {
  const container = document.getElementById("modules");

  const card = document.createElement("div");
  card.className = "card";

  const title = document.createElement("input");
  title.placeholder = "Nome do módulo";

  const progressBar = document.createElement("div");
  progressBar.className = "progress-bar";

  const progress = document.createElement("div");
  progress.className = "progress";

  progressBar.appendChild(progress);

  const taskInput = document.createElement("input");
  taskInput.placeholder = "Nova tarefa";

  const dateInput = document.createElement("input");
  dateInput.type = "date";

  const addBtn = document.createElement("button");
  addBtn.innerText = "Adicionar";

  const deleteModuleBtn = document.createElement("button");
  deleteModuleBtn.innerText = "Excluir módulo";
  deleteModuleBtn.className = "delete-module";

  const taskList = document.createElement("div");

  addBtn.onclick = () => {
    if (taskInput.value.trim() === "") return;

    const task = document.createElement("div");
    task.className = "task";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";

    const span = document.createElement("span");
    span.innerText = taskInput.value;

    const deadline = document.createElement("div");
    deadline.className = "deadline";

    if (dateInput.value) {
      const dueDate = new Date(dateInput.value);
      const today = new Date();

      deadline.innerText = "Prazo: " + dueDate.toLocaleDateString();

      if (dueDate < today) {
        deadline.classList.add("overdue");
      }
    }

    const removeBtn = document.createElement("button");
    removeBtn.innerText = "X";

    checkbox.onclick = () => {
      span.classList.toggle('done');
      updateProgress(card, taskList);
    };

    removeBtn.onclick = () => {
      task.remove();
      updateProgress(card, taskList);
    };

    const textContainer = document.createElement("div");
    textContainer.appendChild(span);
    textContainer.appendChild(deadline);

    task.appendChild(checkbox);
    task.appendChild(textContainer);
    task.appendChild(removeBtn);

    taskList.appendChild(task);
    taskInput.value = "";
    dateInput.value = "";

    updateProgress(card, taskList);
  };

  deleteModuleBtn.onclick = () => card.remove();

  card.appendChild(title);
  card.appendChild(progressBar);
  card.appendChild(taskInput);
  card.appendChild(dateInput);
  card.appendChild(addBtn);
  card.appendChild(taskList);
  card.appendChild(deleteModuleBtn);

  container.appendChild(card);
}
</script>

</body>
</html>
